spring.application.name=EventoP2LBD
server.servlet.context-path=/EventoP2LBD
spring.mvc.view.prefix=/WEB-INF/view/
spring.mvc.view.suffix=.jsp
server.port=8080

spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://127.0.0.1:1433;databaseName=Evento;encrypt=true;trustServerCertificate=true
